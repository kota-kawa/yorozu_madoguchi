name: Copilot Code Review

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize

permissions:
  pull-requests: write

jobs:
  request-copilot-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Request review from Copilot
        uses: actions/github-script@v7
        with:
          script: |
            const pullRequestId = context.payload.pull_request.node_id;
            const pullNumber = context.payload.pull_request.number;
            const botLogin = "copilot-pull-request-reviewer[bot]";

            try {
              await github.graphql(
                `mutation RequestCopilotReview($input: RequestReviewsByLoginInput!) {
                  requestReviewsByLogin(input: $input) {
                    pullRequest {
                      number
                    }
                  }
                }`,
                {
                  input: {
                    pullRequestId,
                    botLogins: [botLogin],
                    union: true
                  }
                }
              );
              core.info(`Requested review from ${botLogin} on PR #${pullNumber}.`);
            } catch (error) {
              const message = error instanceof Error ? error.message : String(error);
              if (/already requested/i.test(message)) {
                core.warning(`Copilot review was already requested for PR #${pullNumber}.`);
                return;
              }
              throw error;
            }
